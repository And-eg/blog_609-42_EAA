{% extends "base_layout.html" %}
{% load static %}

{% block title %}Login{% endblock title %}

{% block content %}
<h1>Login</h1>
<form method="post" action="{% url 'accounts:login' %}">
    {% csrf_token %}
    {{ form }}
    {% if request.GET.next %}
        <input type="hidden" name="next" value="{{ request.GET.next }}">
    {% endif %}
    <button type="submit">Login</button>
</form>
{% endblock content %}
